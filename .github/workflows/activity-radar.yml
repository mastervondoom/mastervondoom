name: Generate Activity Radar

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - scripts/generate-activity-radar.mjs
      - .github/workflows/activity-radar.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate comic activity radar SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: mastervondoom
        run: node scripts/generate-activity-radar.mjs

      - name: Commit activity radar
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update activity overview radar"
          file_pattern: assets/activity-radar.svg
