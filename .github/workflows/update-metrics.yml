name: update-metrics

on:
  schedule:
    - cron: "30 12 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    name: Update comic operator telemetry
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          COMMIT_BY_ME: "false"
          COMMIT_MESSAGE: "chore: update operator telemetry"
          COMMIT_USERNAME: "mastervondoom"
          COMMIT_EMAIL: "mananpaiwal30@gmail.com"
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_OS: "false"
          SHOW_PROJECTS: "true"
          SHOW_UPDATED_DATE: "true"
          SHOW_PROFILE_VIEWS: "false"
          SHOW_EDITORS: "false"
          SHOW_LANGUAGE: "true"
          SHOW_LANGUAGE_PER_REPO: "false"
          SHOW_LINES_OF_CODE: "true"
          SHOW_COMMIT: "true"
          SHOW_LOC_CHART: "true"
          SHOW_DAYS_OF_WEEK: "false"
          SHOW_SHORT_INFO: "true"
          TIMEZONE: "Asia/Kolkata"
