name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate github-contribution-grid-snake
        uses: Platane/snk@v3
        id: snake
        with:
          github_username: mastervondoom
          outputs_path: dist/github-contribution-grid-snake.svg
          gif_light_mode: dist/github-contribution-grid-snake.gif
          gif_dark_mode: dist/github-contribution-grid-snake-dark.gif

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
