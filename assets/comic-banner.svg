<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-label="Comic loadout banner with DevOps tools">
  <defs>
    <pattern id="halftone" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#000000" opacity="0.07"/>
    </pattern>
    <pattern id="halftone-red" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="2.5" cy="2.5" r="1.4" fill="#ED1D24" opacity="0.1"/>
    </pattern>
    <filter id="stickerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Panel -->
  <rect width="1200" height="400" fill="#FFFDF5"/>
  <rect width="1200" height="400" fill="url(#halftone)"/>
  <rect x="8" y="8" width="1184" height="384" rx="18" fill="none" stroke="#000000" stroke-width="4"/>
  <rect x="14" y="14" width="1172" height="372" rx="14" fill="none" stroke="#FFE135" stroke-width="3"/>

  <!-- Corner bursts (kept small so center stays clear) -->
  <g transform="translate(72,52)">
    <polygon points="0,-24 8,-8 24,0 8,8 0,24 -8,8 -24,0 -8,-8" fill="#FFE135" stroke="#000000" stroke-width="2.5"/>
  </g>
  <g transform="translate(1128,52)">
    <polygon points="0,-22 8,-8 22,0 8,8 0,22 -8,8 -22,0 -8,-8" fill="#ED1D24" stroke="#000000" stroke-width="2.5"/>
  </g>
  <path d="M 150 42 L 140 62 L 154 62 L 144 86 L 168 58 L 154 58 L 162 42 Z" fill="#FFE135" stroke="#000000" stroke-width="2"/>
  <path d="M 1050 42 L 1040 62 L 1054 62 L 1044 86 L 1068 58 L 1054 58 L 1062 42 Z" fill="#FFE135" stroke="#000000" stroke-width="2"/>

  <!-- Stars -->
  <g fill="#FFE135" stroke="#000000" stroke-width="1.5">
    <polygon points="220,48 223,56 232,56 225,61 228,70 220,65 212,70 215,61 208,56 217,56"/>
    <polygon points="980,340 983,348 992,348 985,353 988,362 980,357 972,362 975,353 968,348 977,348"/>
    <polygon points="180,330 183,337 191,337 185,342 188,350 180,345 172,350 175,342 169,337 177,337"/>
  </g>

  <!-- Comic stamp -->
  <g transform="translate(600,42)">
    <rect x="-95" y="-16" width="190" height="32" rx="8" fill="#FFE135" stroke="#000000" stroke-width="2.5"/>
    <text x="0" y="6" text-anchor="middle" fill="#000000" font-family="Impact, Arial Black, sans-serif" font-size="18" letter-spacing="2">OPERATOR LOADOUT</text>
  </g>

  <!-- Floating sticker rows — DevOps & cloud tools -->
  <g filter="url(#stickerShadow)">
    <image xlink:href="https://skillicons.dev/icons?i=aws,azure,gcp,kubernetes,docker,terraform,helm,linux&amp;perline=8&amp;theme=light" x="120" y="78" width="960" height="48"/>
    <image xlink:href="https://skillicons.dev/icons?i=github,gitlab,jenkins,ansible,prometheus,grafana,python,go&amp;perline=8&amp;theme=light" x="120" y="148" width="960" height="48"/>
    <image xlink:href="https://skillicons.dev/icons?i=java,kafka,redis,postgres,mysql,nginx,vault,git&amp;perline=8&amp;theme=light" x="120" y="218" width="960" height="48"/>
  </g>

  <!-- Sticker pills row -->
  <g font-family="Arial, sans-serif" font-size="11" font-weight="700">
    <rect x="95" y="292" width="88" height="26" rx="6" fill="#FFFFFF" stroke="#000000" stroke-width="2"/><text x="139" y="309" text-anchor="middle" fill="#000">ArgoCD</text>
    <rect x="195" y="292" width="108" height="26" rx="6" fill="#FFFFFF" stroke="#ED1D24" stroke-width="2"/><text x="249" y="309" text-anchor="middle" fill="#000">OpenTelemetry</text>
    <rect x="315" y="292" width="88" height="26" rx="6" fill="#FFFFFF" stroke="#000000" stroke-width="2"/><text x="359" y="309" text-anchor="middle" fill="#000">Datadog</text>
    <rect x="415" y="292" width="100" height="26" rx="6" fill="#FFFFFF" stroke="#ED1D24" stroke-width="2"/><text x="465" y="309" text-anchor="middle" fill="#000">OpenSearch</text>
    <rect x="527" y="292" width="96" height="26" rx="6" fill="#FFFFFF" stroke="#000000" stroke-width="2"/><text x="575" y="309" text-anchor="middle" fill="#000">Cloudflare</text>
    <rect x="635" y="292" width="96" height="26" rx="6" fill="#FFFFFF" stroke="#ED1D24" stroke-width="2"/><text x="683" y="309" text-anchor="middle" fill="#000">SonarQube</text>
    <rect x="743" y="292" width="72" height="26" rx="6" fill="#FFFFFF" stroke="#000000" stroke-width="2"/><text x="779" y="309" text-anchor="middle" fill="#000">Trivy</text>
    <rect x="827" y="292" width="88" height="26" rx="6" fill="#FFFFFF" stroke="#ED1D24" stroke-width="2"/><text x="871" y="309" text-anchor="middle" fill="#000">LangGraph</text>
    <rect x="927" y="292" width="80" height="26" rx="6" fill="#FFFFFF" stroke="#000000" stroke-width="2"/><text x="967" y="309" text-anchor="middle" fill="#000">CrewAI</text>
    <rect x="1019" y="292" width="72" height="26" rx="6" fill="#FFFFFF" stroke="#ED1D24" stroke-width="2"/><text x="1055" y="309" text-anchor="middle" fill="#000">Ollama</text>
    <rect x="95" y="332" width="64" height="26" rx="6" fill="#FFFFFF" stroke="#000000" stroke-width="2"/><text x="127" y="349" text-anchor="middle" fill="#000">vLLM</text>
    <rect x="171" y="332" width="64" height="26" rx="6" fill="#FFFFFF" stroke="#ED1D24" stroke-width="2"/><text x="203" y="349" text-anchor="middle" fill="#000">MCP</text>
    <rect x="247" y="332" width="88" height="26" rx="6" fill="#FFFFFF" stroke="#000000" stroke-width="2"/><text x="291" y="349" text-anchor="middle" fill="#000">WhisperX</text>
  </g>

  <!-- Speed lines bottom -->
  <g stroke="#000000" stroke-width="1.5" opacity="0.08">
    <line x1="40" y1="360" x2="200" y2="370"/>
    <line x1="1000" y1="365" x2="1160" y2="355"/>
  </g>
</svg>
